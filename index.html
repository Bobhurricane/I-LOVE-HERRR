<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* 💖 INTRO SCREEN */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 99999;
}

#bigHeart {
    font-size: 90px;
    animation: pulse 1.5s infinite;
}

#introText {
    margin-top: 20px;
    font-size: 20px;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* 🤍 WHITE HEART ENTRANCE */
.white-heart {
    position: fixed;
    font-size: 25px;
    color: white;
    animation: fall 1.5s linear forwards;
    z-index: 99998;
    pointer-events: none;
}

@keyframes fall {
    to {
        transform: translateY(120vh);
        opacity: 0;
    }
}

/* MAIN */
.container {
    padding: 40px 20px;
}

h1 {
    font-size: 3em;
}

#typing {
    font-size: 1.2em;
    max-width: 700px;
    margin: auto;
    white-space: pre-line;
    line-height: 1.8;
    opacity: 0;
    transition: opacity 1s ease-in;
}

/* 📸 GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    padding: 10px;
    max-width: 900px;
    margin: auto;
}

.gallery img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

/* 🔦 SPOTLIGHT EFFECT */
.gallery img.active {
    transform: scale(1.1);
    box-shadow: 0 0 40px rgba(255,255,255,0.9);
    filter: brightness(1.4);
}

/* 💌 SECRET */
#secret {
    margin-top: 100px;
    padding: 60px 20px;
    font-size: 1.5em;
    opacity: 0;
    transform: translateY(30px);
    transition: all 1.5s ease;
}

/* 💖 HEART CONFETTI */
.heart-float {
    position: fixed;
    top: -10px;
    font-size: 20px;
    animation: fall linear forwards;
    pointer-events: none;
    z-index: 9999;
}
</style>
</head>

<body>

<!-- 💖 INTRO -->
<div id="intro">
    <div id="bigHeart">💖</div>
    <div id="introText">Click to reveal my message</div>
</div>

<audio id="song" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <p id="typing"></p>

    <h2>Memories 📸</h2>

    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
        <img src="photo3.jpg">
        <img src="photo4.jpg">
        <img src="photo5.jpg">
        <img src="photo6.jpg">
        <img src="photo7.jpg">
        <img src="photo8.jpg">
        <img src="photo9.jpg">
        <img src="photo10.jpg">
        <img src="photo11.jpg">
        <img src="photo12.jpg">
        <img src="photo13.jpg">
        <img src="photo14.jpg">
        <img src="photo15.jpg">
        <img src="photo16.jpg">
    </div>

    <div id="secret">
        💖 If you’re reading this, just know I chose you every single day, and I always will. 💖
    </div>

</div>

<script>

/* 💌 MESSAGE */
const text = `Dear Kylie ❤️

I see you’ve found this website I made. This was created directly for you and no one else.

Every day I think about you when I wake up, and you’re still on my mind when I go to sleep.

I want us to last and continue loving each other forever.

I want us to build a life together—maybe even have a daughter and two cats—and accomplish our dreams side by side.

My life has been immediately better ever since you came into it, no joke.

I genuinely love you.

Sincerely,  
Gael ❤️

I love you ❤️`;

/* START AFTER INTRO */
document.getElementById("intro").addEventListener("click", () => {

    // white heart curtain
    for (let i = 0; i < 40; i++) {
        const h = document.createElement("div");
        h.className = "white-heart";
        h.innerHTML = "🤍";
        h.style.left = Math.random() * 100 + "vw";
        h.style.animationDuration = (Math.random() * 1.5 + 1) + "s";
        document.body.appendChild(h);

        setTimeout(() => h.remove(), 2000);
    }

    setTimeout(() => {
        document.getElementById("intro").style.display = "none";
        startTyping();
        startMusic();
    }, 800);
});

/* typing */
let i = 0;
const typingEl = document.getElementById("typing");

function startTyping() {
    typingEl.style.opacity = "1";

    function type() {
        if (i < text.length) {
            typingEl.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 40);
        }
    }
    type();
}

/* music */
let musicStarted = false;

function startMusic() {
    if (musicStarted) return;

    const audio = document.getElementById("song");
    audio.volume = 0.7;

    audio.play().then(() => {
        musicStarted = true;
    });
}

/* 💖 CONFETTI */
let heartsPlayed = false;

function spawnHearts() {
    for (let i = 0; i < 60; i++) {
        const h = document.createElement("div");
        h.className = "heart-float";
        h.innerHTML = "💖";
        h.style.left = Math.random() * 100 + "vw";
        h.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 4000);
    }
}

/* scroll trigger */
window.addEventListener("scroll", () => {
    const scrollPosition = window.innerHeight + window.scrollY;
    const pageHeight = document.body.offsetHeight;

    if (scrollPosition >= pageHeight - 10) {

        document.getElementById("secret").style.opacity = "1";
        document.getElementById("secret").style.transform = "translateY(0)";

        if (!heartsPlayed) {
            heartsPlayed = true;
            spawnHearts();
        }
    }
});

/* 🔦 IMAGE SPOTLIGHT */
document.querySelectorAll(".gallery img").forEach(img => {
    img.addEventListener("click", () => {
        img.classList.toggle("active");
    });
});

</script>

</body>
</html>
