<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

.container {
    padding: 40px 20px;
}

h1 {
    font-size: 3em;
}

#typing {
    font-size: 1.2em;
    max-width: 700px;
    margin: auto;
    white-space: pre-line;
    line-height: 1.8;
    opacity: 0;
    transition: opacity 1s ease-in;
}

/* 📸 PHOTO GRID */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    padding: 10px;
    max-width: 900px;
    margin: auto;
}

.gallery img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 15px;
}

/* 💌 SECRET MESSAGE */
#secret {
    margin-top: 100px;
    padding: 60px 20px;
    font-size: 1.5em;
    opacity: 0;
    transform: translateY(30px);
    transition: all 1.5s ease;
}

/* 💖 HEART CONFETTI */
.heart-float {
    position: fixed;
    top: -10px;
    font-size: 20px;
    animation: fall linear forwards;
    pointer-events: none;
    z-index: 9999;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1>For You ❤️</h1>

<audio id="song" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">

    <p id="typing"></p>

    <h2>Memories 📸</h2>

    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
        <img src="photo3.jpg">
        <img src="photo4.jpg">
        <img src="photo5.jpg">
        <img src="photo6.jpg">
        <img src="photo7.jpg">
        <img src="photo8.jpg">
        <img src="photo9.jpg">
        <img src="photo10.jpg">
        <img src="photo11.jpg">
        <img src="photo12.jpg">
        <img src="photo13.jpg">
        <img src="photo14.jpg">
        <img src="photo15.jpg">
        <img src="photo16.jpg">
    </div>

    <!-- 💖 SECRET -->
    <div id="secret">
        💖 If you’re reading this, just know I chose you every single day, and I always will. No matter what happens, you’ll always have a place in my heart. 💖
    </div>

</div>

<script>

/* 💌 MESSAGE */
const text = `Dear Kylie ❤️

I see you’ve found this website I made. This was created directly for you and no one else.

Every day I think about you when I wake up, and you’re still on my mind when I go to sleep.

I want us to last and continue loving each other forever.

I want us to build a life together—maybe even have a daughter and two cats—and accomplish our dreams side by side.

My life has been immediately better ever since you came into it, no joke. I know it might sound dramatic, but I genuinely love you.

Our relationship has stayed strong while others around us have fallen apart.

Even though we have our ups and downs like a roller coaster, we always find our way back to each other and grow a stronger, unbreakable bond.

I’m sorry if I’ve ever hurt your feelings—that was never my intention. You truly are the person I want to love.

Sincerely,  
Gael ❤️

I love you ❤️`;

/* typing */
let i = 0;
const typingEl = document.getElementById("typing");

function type() {
    if (i === 0) typingEl.style.opacity = "1";

    if (i < text.length) {
        typingEl.innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 40);
    }
}
type();

/* music */
let musicStarted = false;

function startMusic() {
    if (musicStarted) return;

    const audio = document.getElementById("song");
    audio.volume = 0.7;

    audio.play().then(() => {
        musicStarted = true;
    }).catch(err => {
        console.log("Blocked until interaction:", err);
    });
}

window.addEventListener("scroll", startMusic);
window.addEventListener("click", startMusic);
window.addEventListener("touchstart", startMusic);

/* 💖 HEART CONFETTI */
let heartsPlayed = false;

function spawnHearts() {
    for (let i = 0; i < 60; i++) {
        const heart = document.createElement("div");
        heart.classList.add("heart-float");
        heart.innerHTML = "💖";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
        heart.style.fontSize = (Math.random() * 10 + 15) + "px";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);
    }
}

/* 💌 scroll end trigger */
window.addEventListener("scroll", () => {
    const scrollPosition = window.innerHeight + window.scrollY;
    const pageHeight = document.body.offsetHeight;

    if (scrollPosition >= pageHeight - 10) {

        document.getElementById("secret").style.opacity = "1";
        document.getElementById("secret").style.transform = "translateY(0)";

        if (!heartsPlayed) {
            heartsPlayed = true;
            spawnHearts();
        }
    }
});

</script>

</body>
</html>
