<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
    color: white;
    text-align: center;
}

.container {
    padding: 40px;
}

h1 {
    font-size: 3em;
}

#typing {
    font-size: 1.2em;
    max-width: 600px;
    margin: auto;
    white-space: pre-line;
    border-right: 2px solid white;
}

img {
    width: 200px;
    border-radius: 15px;
    margin: 10px;
}
</style>
</head>

<body>

<h1>For You ❤️</h1>

<!-- MUSIC -->
<audio id="song" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <p id="typing"></p>

    <h2>Memories 📸</h2>
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<script>
/* Typing effect */
const text = `Happy Birthday ❤️

helloo i see you have found this website i made, this website is made directly for you and no one else,
everyday i dream of you and wake up to the thought of you and end my day with the thought of you, i want us to last and
love eachother forever

I love you ❤️`;

let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 40);
    }
}
type();

/* 🎵 MUSIC STARTS ON SCROLL */
let musicStarted = false;

function startMusic() {
    if (musicStarted) return;

    const audio = document.getElementById("song");

    audio.play().then(() => {
        musicStarted = true;
    }).catch(err => {
        console.log("Autoplay blocked:", err);
    });
}

window.addEventListener("scroll", startMusic);
</script>

</body>
</html>
